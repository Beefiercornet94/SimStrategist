{% extends "layout.html" %}

{% block title %}Strategy Co-Pilot{% endblock %}

{% block body %}
<div class="container py-4">
    <h4 class="text-white fw-bold mb-4">Strategy Co-Pilot</h4>

    <!-- Session Summary -->
    <div class="dash-card mb-4">
        <div class="telemetry-section-title">Session Summary</div>
        <div class="row g-2 mt-1 text-center">
            <div class="col-6 col-md-2">
                <div class="telemetry-label">Position</div>
                <div class="text-white fw-bold fs-4" id="s-position">--</div>
            </div>
            <div class="col-6 col-md-2">
                <div class="telemetry-label">Lap</div>
                <div class="text-white fw-bold fs-4" id="s-lap">--</div>
            </div>
            <div class="col-6 col-md-2">
                <div class="telemetry-label">Total Laps</div>
                <div class="text-white fw-bold fs-4" id="s-total-laps">--</div>
            </div>
            <div class="col-6 col-md-2">
                <div class="telemetry-label">Track Temp</div>
                <div class="text-white fw-bold fs-4" id="s-track-temp">--°C</div>
            </div>
            <div class="col-6 col-md-2">
                <div class="telemetry-label">Air Temp</div>
                <div class="text-white fw-bold fs-4" id="s-air-temp">--°C</div>
            </div>
            <div class="col-6 col-md-2">
                <div class="telemetry-label">Weather</div>
                <div class="text-white fw-bold fs-5" id="s-weather">--</div>
            </div>
        </div>
    </div>

    <!-- Recommendations -->
    <div class="telemetry-section-title mb-3">Recommendations</div>
    <div id="recommendations-list"></div>
</div>

<script src="/static/scripts/strategy.js"></script>
{% endblock %}
