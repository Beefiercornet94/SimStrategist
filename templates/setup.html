{% extends "layout.html" %}

{% block title %}Account Setup{% endblock %}

{% block body %}
<div class="container py-5" style="max-width: 480px;">

    <div class="text-center mb-4">
        <h2 class="text-white fw-bold">Account</h2>
        <p class="text-secondary">Manage your SimStrategist account</p>
    </div>

    <!-- Logged-in panel -->
    <div class="dash-card mb-4">
        <p class="telemetry-section-title mb-3">Session</p>
        <p class="text-secondary mb-3">You are currently logged in.</p>
        <a href="/logout" class="btn btn-outline-danger w-100">Log Out</a>
    </div>

    <!-- Register a new account -->
    <div class="dash-card mb-4">
        <p class="telemetry-section-title mb-3">Register a New Account</p>
        <form action="/register" method="post">
            <div class="mb-3">
                <input class="form-control bg-dark text-white border-secondary"
                       autocomplete="off" name="username" placeholder="Username" type="text" required>
            </div>
            <div class="mb-3">
                <input class="form-control bg-dark text-white border-secondary"
                       name="password" placeholder="Password" type="password" required>
            </div>
            <div class="mb-3">
                <input class="form-control bg-dark text-white border-secondary"
                       name="confirmation" placeholder="Confirm Password" type="password" required>
            </div>
            <button type="submit" class="btn btn-outline-light w-100">Register</button>
        </form>
    </div>

    <!-- Switch account / log in as a different user -->
    <div class="dash-card">
        <p class="telemetry-section-title mb-3">Log In as a Different User</p>
        <form action="/login" method="post">
            <div class="mb-3">
                <input class="form-control bg-dark text-white border-secondary"
                       autocomplete="off" name="username" placeholder="Username" type="text" required>
            </div>
            <div class="mb-3">
                <input class="form-control bg-dark text-white border-secondary"
                       name="password" placeholder="Password" type="password" required>
            </div>
            <button type="submit" class="btn btn-outline-light w-100">Log In</button>
        </form>
    </div>

</div>
{% endblock %}
